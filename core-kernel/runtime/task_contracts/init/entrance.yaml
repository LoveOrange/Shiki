id: entrance
stage: Init
goal: Extract existing entry contracts, trace call chains, and map business flows.
inputs:
- shiki_context/project/architecture.md
- shiki_context/project/ubiquitous_language.md
- source target from Init _plan.md
references:
- core-kernel/workflows/init/entrance.md
output:
  path: modules/{module}/entrances/{entrance}.md
  mode: create_or_update
  template: core-kernel/templates/module/entrances/_entrance_spec_template.md
checks:
- target source file exists
- module README/index/_plan exist or can be created
evidence_rules:
- entrances and flows must be generated from traced call chain
retry_policy:
  max_attempts: 1
done_condition:
- at least one entrances/*.md or flows/*.md file created or updated
- module index.md updated by append
- Discovery Log present in flow output
tech_contract: tech_stacks
workflow_ref: core-kernel/workflows/init/entrance.md
