id: sync
stage: Init
goal: Aggregate global architecture, messaging topology, and technical debt.
inputs:
- shiki_context/workspace/_plan.md
- shiki_context/project/index.md
- shiki_context/modules/*/index.md
- Discovery Log snippets from completed init.entrance flow outputs
- shiki_context/project/architecture.md
- shiki_context/project/integration.md
references:
- core-kernel/workflows/init/sync.md
output:
  path: project/tech_debt.md
  mode: create_or_update
  template: ""
checks:
- all init.entrance rows in Init _plan.md have output_files
evidence_rules:
- aggregate Discovery Log entries without duplicating module-local detail
- do not load all module flows at once; process by module or flow batch when needed
retry_policy:
  max_attempts: 1
done_condition:
- module dependency summary updated when dependencies exist
- project/tech_debt.md created or updated
tech_contract: tech_stacks
workflow_ref: core-kernel/workflows/init/sync.md
