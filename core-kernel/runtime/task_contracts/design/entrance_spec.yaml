id: entrance_spec
stage: Design
goal: Generate external entrance spec.
inputs:
- shiki_context/features/{feature}/design_brief.md
- shiki_context/features/{feature}/modules/{module}/designs/model.md
references:
- core-kernel/workflows/design/entrance_spec.md
output:
  path: features/{feature}/modules/{module}/entrances/{entrance}.md
  mode: create
  template: core-kernel/templates/module/entrances/_entrance_spec_template.md
checks:
- modules/{module}/designs/model.md exists
- design_brief §6 indicates new/changed entrance
- baseline delta table uses only reuse/add/extend/modify/deprecate when generating feature overlay
done_condition:
- entrance spec created with §1-§6 filled
- §0 Baseline Delta filled or MANUAL_DECISION returned
tech_contracts: ["java/ddd-spring"]
workflow_ref: core-kernel/workflows/design/entrance_spec.md
