id: model
stage: Design
goal: Generate domain model design from Design Brief.
inputs:
- shiki_context/features/{feature}/design_brief.md
- shiki_context/project/ubiquitous_language.md
references:
- core-kernel/runtime/design_contract.md
- core-kernel/workflows/design/model.md
output:
  path: features/{feature}/modules/{module}/designs/model.md
  mode: create
  template: core-kernel/templates/module/designs/_model_template.md
checks:
- design_brief exists
- baseline delta uses reuse/add/extend/modify/deprecate
- domain relationships use Mermaid classDiagram, not database erDiagram
- Design Contract Reuse Gate completed before output generation
- every add has brief/upstream evidence and no reusable baseline/source equivalent
done_condition:
- modules/{module}/designs/model.md created with §1-§6 non-empty
- §0 Baseline Delta filled or MANUAL_DECISION
- §0 Reuse Decision Gate records checked baseline/source candidates and reuse/extend/add justification
- §5 is Domain Relationship Diagram without table/column/PK/FK/index/DDL details
tech_contracts: ["java/ddd-spring"]
workflow_ref: core-kernel/workflows/design/model.md
