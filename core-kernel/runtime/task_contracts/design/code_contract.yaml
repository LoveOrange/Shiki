id: code_contract
stage: Design
kind: code_contract
goal: Extract key facts from design artifacts into coding contract.
inputs:
- shiki_context/features/{feature}/modules/{module}/designs/model.md
- shiki_context/features/{feature}/modules/{module}/designs/persistence.md
- shiki_context/features/{feature}/modules/{module}/designs/acl.md
- shiki_context/features/{feature}/modules/{module}/designs/component.md
- shiki_context/features/{feature}/modules/{module}/entrances/*.md
- shiki_context/features/{feature}/modules/{module}/flows/*.md
references:
- core-kernel/workflows/design/code_contract.md
artifact:
  path: features/{feature}/code_contract.md
  mode: create
  template: core-kernel/templates/feature/code_contract.md
checks:
- all design artifacts exist
