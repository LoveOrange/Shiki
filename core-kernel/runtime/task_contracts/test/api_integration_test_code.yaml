- integration test files are created or updated and registered in _plan.md output_files
- integration tests map to relevant TC-INT cases
- assertions cover request method, input, expected response, and observable side effects when declared
tech_contracts: ["java/ddd-spring"]
workflow_ref: core-kernel/workflows/test/api_integration_test_code.md
