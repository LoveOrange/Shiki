kind: canonical
id: api_case_spec
stage: Design
goal: Generate API blackbox integration test cases from current entrance and L2 specs.
inputs:
- path: shiki_context/features/{feature}/_plan.md
  required: true
- path: shiki_context/features/{feature}/tests/test_cases.md
  required: false
- path: shiki_context/features/{feature}/modules/{module}/entrances/*.md
  required: true
- path: shiki_context/features/{feature}/modules/{module}/designs/model.md
  required: true
- path: shiki_context/features/{feature}/modules/{module}/designs/acl.md
  required: false
output:
  path: features/{feature}/tests/test_cases.md
workflow_ref: core-kernel/workflows/test/api_case_spec.md
